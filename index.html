<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注音練習本 - 手動發音版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #FF9AAA, #FFC9DE, #B1E5FF, #D4A5FF, #FFE4A8, #A8FFD9);
            background-size: 600% 600%;
            animation: bgGradient 15s ease infinite;
            background-attachment: fixed;
            padding: 20px;
            padding-bottom: 70px;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 4px solid #FFD6E0;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #FF6B9D, #74B9FF, #6C5CE7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }

        #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; }
        .name-input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        #userNameInput { font-size: 32px; padding: 10px 20px; border-radius: 15px; border: 4px solid #FFD6E0; text-align: center; width: 250px; outline: none; }

        .symbol-section {
            margin-bottom: 20px; text-align: center; background: #F8F9FF; padding: 20px; border-radius: 20px; border: 2px solid #E0E7FF;
        }

        /* 符號與發音按鈕對齊樣式 */
        .symbol-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        #currentSymbol {
            font-size: 100px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
        }

        .audio-btn {
            background: #FFD6E0;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .audio-btn:hover {
            transform: scale(1.1);
            background: #FFB1C1;
        }

        .canvas-container {
            position: relative; width: 100%; height: 380px; border: 4px solid #74B9FF; border-radius: 15px; background: white; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; cursor: crosshair; display: block; }
        .symbol-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 180px; opacity: 0.1; pointer-events: none; }

        .association-input-area { margin-top: 15px; text-align: center; }
        #associationInput { width: 100%; padding: 12px; font-size: 18px; border-radius: 12px; border: 2px solid #D4A5FF; outline: none; text-align: center; }

        .navigation { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .btn-primary { background: linear-gradient(135deg, #74B9FF, #6C5CE7); color: white; padding: 12px 40px; border: none; border-radius: 15px; font-size: 20px; cursor: pointer; font-weight: bold; }

        .tool-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .tool-btns { display: flex; gap: 8px; }
        .tool-btns button { padding: 8px 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; border: 2px solid rgba(0,0,0,0.05); }

        .footer-copyright { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); text-align: center; padding: 12px; font-weight: bold; border-top: 2px solid #FFD6E0; z-index: 1000; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .result-item { border-radius: 15px; padding: 12px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .result-drawing { width: 100%; height: 90px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 5px 0; }
        .result-drawing img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .result-text { font-size: 13px; color: #444; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="home-screen" class="container">
        <div class="name-input-group">
            <input type="text" id="userNameInput" placeholder="輸入名字">
            <h1>ㄉ注音練習本</h1>
        </div>
        <button id="startBtn" class="btn-primary" style="border-radius: 50px;">開始練習</button>
    </div>

    <div id="learning-screen" class="container" style="display:none;">
        <h1 id="learningTitle">注音練習本</h1>
        
        <div class="symbol-section">
            <div class="symbol-container">
                <div id="currentSymbol" onclick="speakCurrent()">ㄅ</div>
                <button class="audio-btn" onclick="speakCurrent()">🔊</button>
            </div>
            <div style="font-size: 18px; font-weight: bold; color: #666;">
                拼音: <span id="pinyin">b</span> | 例字: <span id="exampleWord">八、爸、棒</span>
            </div>
        </div>
        
        <div class="drawing-area">
            <div class="tool-bar">
                <h3 style="color: #6C5CE7;">✏️ 畫下你的聯想圖</h3>
                <div class="tool-btns">
                    <button id="undoBtn" style="background:#B1E5FF; color:#333;">上一步</button>
                    <button id="clearBtn" style="background:#FDCB6E; color:#333;">清除</button>
                    <button id="changeColorBtn" style="color:white;">換色</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="drawingCanvas"></canvas>
                <div id="symbolWatermark" class="symbol-watermark">ㄅ</div>
            </div>
            <div class="association-input-area">
                <input type="text" id="associationInput" placeholder="你聯想的是？">
            </div>

            <div id="bReference" style="background: #FFF9FB; border-radius: 15px; padding: 20px; border: 2px dashed #FFD6E0; display: none; margin-top: 20px;">
                <h4 style="text-align:center; color:#FF6B9D; margin-bottom:10px;">💡布魯托的聯想參考：</h4>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <img src="1.jpg" style="max-width:45%; border-radius:10px;">
                    <img src="2.jpg" style="max-width:45%; border-radius:10px;">
                </div>
            </div>
        </div>
        
        <div class="navigation">
            <button id="prevBtn" class="btn-primary" disabled>上一個</button>
            <button id="nextBtn" class="btn-primary">下一個</button>
        </div>
    </div>

    <div id="result-screen" class="container" style="display:none;">
        <h1 id="finalTitle">注音練習成果</h1>
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:25px;">
            <button id="downloadAllBtn" style="background:#55EFC4; border:none; padding:15px 30px; border-radius:15px; font-weight:bold; cursor:pointer;">💾 下載注音符號表</button>
            <button id="restartBtn" style="background:#74B9FF; border:none; padding:15px 30px; border-radius:15px; color:white; font-weight:bold; cursor:pointer;">重新開始</button>
        </div>
        <div id="resultGrid" class="result-grid"></div>
    </div>

    <div class="footer-copyright">版權所有 © 布魯托王 | Copyright by Pluto Wang</div>

    <script>
        const bopomofoData = [
            { symbol: 'ㄅ', pinyin: 'b', examples: '八、爸、棒' }, { symbol: 'ㄆ', pinyin: 'p', examples: '跑、拍、旁' },
            { symbol: 'ㄇ', pinyin: 'm', examples: '馬、門、慢' }, { symbol: 'ㄈ', pinyin: 'f', examples: '方、風、飛' },
            { symbol: 'ㄉ', pinyin: 'd', examples: '大、地、電' }, { symbol: 'ㄊ', pinyin: 't', examples: '天、甜、台' },
            { symbol: 'ㄋ', pinyin: 'n', examples: '你、那、牛' }, { symbol: 'ㄌ', pinyin: 'l', examples: '老、亮、路' },
            { symbol: 'ㄍ', pinyin: 'g', examples: '哥、高、光' }, { symbol: 'ㄎ', pinyin: 'k', examples: '開、看、快' },
            { symbol: 'ㄏ', pinyin: 'h', examples: '好、火、紅' }, { symbol: 'ㄐ', pinyin: 'j', examples: '家、見、叫' },
            { symbol: 'ㄑ', pinyin: 'q', examples: '去、奇、請' }, { symbol: 'ㄒ', pinyin: 'x', examples: '小、謝、心' },
            { symbol: 'ㄓ', pinyin: 'zh', examples: '中、真、正' }, { symbol: 'ㄔ', pinyin: 'ch', examples: '吃、出、長' },
            { symbol: 'ㄕ', pinyin: 'sh', examples: '是、書、手' }, { symbol: 'ㄖ', pinyin: 'r', examples: '日、熱、肉' },
            { symbol: 'ㄗ', pinyin: 'z', examples: '子、早、走' }, { symbol: 'ㄘ', pinyin: 'c', examples: '草、從、此' },
            { symbol: 'ㄙ', pinyin: 's', examples: '三、四、思' }, { symbol: 'ㄧ', pinyin: 'i/y', examples: '一、衣、以' },
            { symbol: 'ㄨ', pinyin: 'u/w', examples: '五、問、我' }, { symbol: 'ㄩ', pinyin: 'ü/yu', examples: '魚、雨、玉' },
            { symbol: 'ㄚ', pinyin: 'a', examples: '阿、爸、馬' }, { symbol: 'ㄛ', pinyin: 'o', examples: '喔、波、火' },
            { symbol: 'ㄜ', pinyin: 'e', examples: '哥、得、熱' }, { symbol: 'ㄝ', pinyin: 'ê', examples: '欸、且、寫' },
            { symbol: 'ㄞ', pinyin: 'ai', examples: '愛、台、開' }, { symbol: 'ㄟ', pinyin: 'ei', examples: '飛、雷、北' },
            { symbol: 'ㄠ', pinyin: 'ao', examples: '奧、早、高' }, { symbol: 'ㄡ', pinyin: 'ou', examples: '歐、受、揉' },
            { symbol: 'ㄢ', pinyin: 'an', examples: '安、天、看' }, { symbol: 'ㄣ', pinyin: 'en', examples: '恩、門、真' },
            { symbol: 'ㄤ', pinyin: 'ang', examples: '昂、旁、光' }, { symbol: 'ㄥ', pinyin: 'eng', examples: '風、中、正' },
            { symbol: 'ㄦ', pinyin: 'er', examples: '兒、二、而' }
        ];

        const rainbowColors = ["#FF6B9D","#FF8C74","#FDCB6E","#A8E68F","#55EFC4","#74B9FF","#6C5CE7","#B175FF","#FF76C8","#FF5252","#FF9F43","#C7E700","#3EE8D1","#42A5F5","#7E57C2","#EC407A","#FFAB40","#00E676","#00B8D4","#6200EA","#B2FF59","#FFFF00","#FF6E40","#EA80FC","#00BFA5","#D81B60","#1E88E5","#8E24AA","#43A047","#FDD835","#5C6BC0","#26A69A","#FFA000","#F4511E","#9C27B0","#3949AB","#00ACC1"];

        let currentIndex = 0;
        let userDrawings = {}; 
        let userAssociations = {}; 
        let historyStack = []; 
        let isDrawing = false;
        let userName = "我";
        let currentColor = '#FF5252'; 

        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const associationInput = document.getElementById('associationInput');
        const colorBtn = document.getElementById('changeColorBtn');

        function initColorButton() {
            colorBtn.style.backgroundColor = currentColor;
            colorBtn.style.color = 'white';
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function speakCurrent() {
            const utterance = new SpeechSynthesisUtterance(bopomofoData[currentIndex].symbol);
            utterance.lang = 'zh-TW'; utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function initCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height;
            historyStack = []; 
            if (userDrawings[bopomofoData[currentIndex].symbol]) {
                const img = new Image();
                img.src = userDrawings[bopomofoData[currentIndex].symbol];
                img.onload = () => { ctx.drawImage(img, 0, 0); saveState(); };
            } else { saveState(); }
        }

        function saveState() {
            historyStack.push(canvas.toDataURL());
            if (historyStack.length > 20) historyStack.shift();
        }

        function undo() {
            if (historyStack.length > 1) {
                historyStack.pop();
                const img = new Image();
                img.src = historyStack[historyStack.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    userDrawings[bopomofoData[currentIndex].symbol] = canvas.toDataURL();
                };
            }
        }

        function getPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX - rect.left : e.offsetX;
            const y = e.touches ? e.touches[0].clientY - rect.top : e.offsetY;
            return { x, y };
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            e.preventDefault(); isDrawing = true;
            const { x, y } = getPoint(e); ctx.beginPath(); ctx.moveTo(x, y);
        };
        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if (!isDrawing) return;
            const { x, y } = getPoint(e); ctx.lineTo(x, y);
            ctx.strokeStyle = currentColor; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
        };
        canvas.onmouseup = canvas.ontouchend = () => {
            if (!isDrawing) return; isDrawing = false; saveState();
            userDrawings[bopomofoData[currentIndex].symbol] = canvas.toDataURL();
        };

        function updatePage() {
            const d = bopomofoData[currentIndex];
            document.getElementById('currentSymbol').textContent = d.symbol;
            document.getElementById('currentSymbol').style.color = rainbowColors[currentIndex];
            document.getElementById('pinyin').textContent = d.pinyin;
            document.getElementById('exampleWord').textContent = d.examples;
            document.getElementById('symbolWatermark').textContent = d.symbol;
            document.getElementById('symbolWatermark').style.color = rainbowColors[currentIndex];
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('bReference').style.display = (d.symbol === 'ㄅ') ? 'block' : 'none';
            associationInput.value = userAssociations[d.symbol] || "";
            initCanvas();
        }

        associationInput.oninput = () => { userAssociations[bopomofoData[currentIndex].symbol] = associationInput.value; };
        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('clearBtn').onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height); saveState();
            delete userDrawings[bopomofoData[currentIndex].symbol];
        };
        
        colorBtn.onclick = () => {
            const palette = ["#FF5252","#FF6B9D","#FF8C74","#FDCB6E","#A8E68F","#55EFC4","#74B9FF","#6C5CE7","#B175FF"];
            currentColor = palette[Math.floor(Math.random() * palette.length)];
            colorBtn.style.backgroundColor = currentColor;
        };

        document.getElementById('startBtn').onclick = () => {
            userName = document.getElementById('userNameInput').value.trim() || "我";
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('learning-screen').style.display = 'block';
            document.getElementById('learningTitle').textContent = `${userName}ㄉ注音練習本`;
            initColorButton();
            updatePage();
            // 已移除自動發音 setTimeout
        };

        document.getElementById('nextBtn').onclick = () => { 
            if (currentIndex < bopomofoData.length - 1) { 
                currentIndex++; updatePage(); 
                // 已移除自動發音
            } else { showResult(); } 
        };
        document.getElementById('prevBtn').onclick = () => { if (currentIndex > 0) { currentIndex--; updatePage(); } };

        function showResult() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('finalTitle').textContent = `${userName}ㄉ注音符號表`;
            const grid = document.getElementById('resultGrid');
            grid.innerHTML = '';
            bopomofoData.forEach((d, i) => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.style.backgroundColor = hexToRgba(rainbowColors[i], 0.15);
                item.innerHTML = `
                    <div style="font-size:28px; font-weight:bold; color:${rainbowColors[i]}">${d.symbol}</div>
                    <div style="font-size:12px; color:#555;">${d.pinyin}</div>
                    <div class="result-drawing">${userDrawings[d.symbol] ? `<img src="${userDrawings[d.symbol]}">` : ''}</div>
                    <div class="result-text">${userAssociations[d.symbol] || ''}</div>
                `;
                grid.appendChild(item);
            });
        }

        document.getElementById('downloadAllBtn').onclick = () => {
            const c = document.createElement('canvas'); const ctx2 = c.getContext('2d');
            const cell = 220; const cols = 6; const rows = Math.ceil(37/cols);
            c.width = cols * cell + 60; c.height = rows * cell + 220;
            
            const grd = ctx2.createRadialGradient(c.width/2, c.height/2, 100, c.width/2, c.height/2, c.width);
            grd.addColorStop(0, "#FFFFFF");   
            grd.addColorStop(0.2, "#FFF0F6"); 
            grd.addColorStop(0.4, "#F0F9FF"); 
            grd.addColorStop(0.6, "#FFF9E6"); 
            grd.addColorStop(0.8, "#F3E8FF"); 
            grd.addColorStop(1, "#E6FFF3");   
            ctx2.fillStyle = grd;
            ctx2.fillRect(0, 0, c.width, c.height);
            
            ctx2.fillStyle = '#6C5CE7'; ctx2.font = 'bold 45px Arial'; ctx2.textAlign = 'center';
            ctx2.fillText(`${userName}ㄉ注音符號表`, c.width/2, 80);

            let loaded = 0;
            const totalToLoad = bopomofoData.filter(d => userDrawings[d.symbol]).length;

            bopomofoData.forEach((d, i) => {
                const x = (i % cols) * cell + 30; const y = Math.floor(i / cols) * cell + 130;
                
                ctx2.fillStyle = hexToRgba(rainbowColors[i], 0.2); 
                ctx2.beginPath();
                if (ctx2.roundRect) ctx2.roundRect(x, y, cell-15, cell-15, 20);
                else ctx2.rect(x, y, cell-15, cell-15);
                ctx2.fill();

                ctx2.textAlign = 'center';
                ctx2.fillStyle = rainbowColors[i]; ctx2.font = 'bold 38px Arial';
                ctx2.fillText(d.symbol, x + (cell-15)/2, y + 45);
                
                ctx2.fillStyle = '#444'; ctx2.font = '16px Arial';
                ctx2.fillText(d.pinyin, x + (cell-15)/2, y + 75);

                ctx2.fillStyle = '#333'; ctx2.font = 'bold 15px Arial';
                ctx2.fillText(userAssociations[d.symbol] || '', x + (cell-15)/2, y + cell - 20);

                if (userDrawings[d.symbol]) {
                    const img = new Image(); img.src = userDrawings[d.symbol];
                    img.onload = () => {
                        ctx2.drawImage(img, x+15, y+85, cell-45, cell-135);
                        loaded++;
                        if (loaded === totalToLoad) finishDownload(c);
                    };
                } else if (totalToLoad === 0 && i === 36) finishDownload(c);
            });
            if (totalToLoad === 0) finishDownload(c);
        };

        function finishDownload(c) {
            const ctx2 = c.getContext('2d');
            ctx2.fillStyle = '#999'; ctx2.font = 'bold 18px Arial'; ctx2.textAlign = 'center';
            ctx2.fillText('版權所有 © 布魯托王 | Copyright by Pluto Wang', c.width/2, c.height - 35);
            const a = document.createElement('a'); a.download = `${userName}_注音符號表.png`; a.href = c.toDataURL(); a.click();
        }

        CanvasRenderingContext2D.prototype.fillRoundedRect = function(x, y, w, h, r) {
            this.beginPath(); this.moveTo(x+r, y); this.arcTo(x+w, y, x+w, y+h, r); this.arcTo(x+w, y+h, x, y+h, r); this.arcTo(x, y+h, x, y, r); this.arcTo(x, y, x+w, y, r); this.closePath(); this.fill();
        };

        document.getElementById('restartBtn').onclick = () => location.reload();
        window.onresize = initCanvas;
    </script>
</body>
</html>
