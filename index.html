<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注音練習本 - 靈感廣場整合版</title>
    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #FF9AAA, #FFC9DE, #B1E5FF, #D4A5FF, #FFE4A8, #A8FFD9);
            background-size: 600% 600%;
            animation: bgGradient 15s ease infinite;
            background-attachment: fixed;
            padding: 20px;
            padding-bottom: 70px;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto 30px auto;
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 4px solid #FFD6E0;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #FF6B9D, #74B9FF, #6C5CE7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }

        #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; }
        .name-input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        #userNameInput { font-size: 32px; padding: 10px 20px; border-radius: 15px; border: 4px solid #FFD6E0; text-align: center; width: 250px; outline: none; }

        .symbol-section { margin-bottom: 20px; text-align: center; background: #F8F9FF; padding: 20px; border-radius: 20px; border: 2px solid #E0E7FF; }
        .symbol-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        #currentSymbol { font-size: 100px; font-weight: bold; line-height: 1; cursor: pointer; }

        .audio-btn {
            background: #FFD6E0;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .canvas-container {
            position: relative; width: 100%; height: 380px; border: 4px solid #74B9FF; border-radius: 15px; background: white; overflow: hidden;
            touch-action: none;
        }
        
        canvas { width: 100%; height: 100%; cursor: crosshair; display: block; }
        .symbol-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 180px; opacity: 0.1; pointer-events: none; }

        .association-input-area { margin-top: 15px; text-align: center; }
        #associationInput { width: 100%; padding: 12px; font-size: 18px; border-radius: 12px; border: 2px solid #D4A5FF; outline: none; text-align: center; }

        .tool-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .tool-btns { display: flex; gap: 8px; }
        .tool-btns button { padding: 8px 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; border: 2px solid rgba(0,0,0,0.05); }

        .reference-area { background: #FFF9FB; border-radius: 15px; padding: 20px; border: 2px dashed #FFD6E0; display: none; margin-top: 20px; }
        .reference-area h4 { color: #FF6B9D; margin-bottom: 15px; text-align: center; font-size: 18px; }
        .ref-img-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; align-items: flex-start; max-width: 600px; margin: 0 auto; }
        .ref-img-container img { width: 45%; height: auto; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid white; background-color: #eee; }

        .navigation { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .btn-primary { background: linear-gradient(135deg, #74B9FF, #6C5CE7); color: white; padding: 12px 40px; border: none; border-radius: 15px; font-size: 20px; cursor: pointer; font-weight: bold; }

        .footer-copyright { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); text-align: center; padding: 12px; font-weight: bold; border-top: 2px solid #FFD6E0; z-index: 1000; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .result-item { border-radius: 15px; padding: 12px; text-align: center; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.2s; }
        .result-drawing { width: 100%; height: 90px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 5px 0; }
        .result-drawing img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .result-text { font-size: 13px; color: #444; font-weight: bold; min-height: 1.2em; }

        .plaza-section { margin-top: 30px; border-top: 2px dashed #FFD6E0; padding-top: 20px; }
        .plaza-title { text-align: center; margin-bottom: 20px; color: #6C5CE7; font-size: 24px; }
        .plaza-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .plaza-item { background: white; border-radius: 12px; overflow: hidden; border: 2px solid #FFD6E0; cursor: pointer; transition: transform 0.2s; }
        .plaza-item:hover { transform: scale(1.03); }
        .plaza-item img { width: 100%; height: auto; display: block; }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" src=""></div>

    <div id="home-screen" class="container">
        <div class="name-input-group">
            <input type="text" id="userNameInput" placeholder="輸入名字">
            <h1>ㄉ注音練習本</h1>
        </div>
        <button id="startBtn" class="btn-primary" style="border-radius: 50px;">開始練習</button>
        <div class="plaza-section">
            <h2 class="plaza-title">✨ 靈感廣場 ✨</h2>
            <div id="plazaGridHome" class="plaza-grid"><p style="text-align: center; grid-column: 1/-1;">載入靈感中...</p></div>
        </div>
    </div>

    <div id="learning-screen" class="container" style="display:none;">
        <h1 id="learningTitle">注音練習本</h1>
        <div class="symbol-section">
            <div class="symbol-container">
                <div id="currentSymbol" onclick="speakCurrent()">ㄅ</div>
                <button class="audio-btn" onclick="speakCurrent()">🔊</button>
            </div>
            <div style="font-size: 18px; font-weight: bold; color: #666;">
                拼音: <span id="pinyin">b</span> | 例字: <span id="exampleWord">八、爸、棒</span>
            </div>
        </div>
        <div class="drawing-area">
            <div class="tool-bar">
                <h3 style="color: #6C5CE7;">✏️ 畫下你的聯想圖</h3>
                <div class="tool-btns">
                    <button id="undoBtn" style="background:#B1E5FF; color:#333;">上一步</button>
                    <button id="clearBtn" style="background:#FDCB6E; color:#333;">清除</button>
                    <button id="changeColorBtn" style="color:white;">換色</button>
                </div>
            </div>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="drawingCanvas"></canvas>
                <div id="symbolWatermark" class="symbol-watermark">ㄅ</div>
            </div>
            <div class="association-input-area">
                <input type="text" id="associationInput" placeholder="你聯想的是？">
            </div>
            <div id="bReference" class="reference-area">
                <h4>💡布魯托的聯想參考：</h4>
                <div class="ref-img-container">
                    <img src="1.jpg" alt="參考圖 1">
                    <img src="2.jpg" alt="參考圖 2">
                </div>
            </div>
        </div>
        <div class="navigation">
            <button id="prevBtn" class="btn-primary" disabled>上一個</button>
            <button id="nextBtn" class="btn-primary">下一個</button>
        </div>
    </div>

    <div id="result-screen" class="container" style="display:none;">
        <h1 id="finalTitle">注音練習成果</h1>
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:25px; flex-wrap:wrap;">
            <button id="downloadAllBtn" style="background:#55EFC4; border:none; padding:15px 30px; border-radius:15px; font-weight:bold; cursor:pointer;">💾 下載注音符號表</button>
            <button id="restartBtn" style="background:#74B9FF; border:none; padding:15px 30px; border-radius:15px; color:white; font-weight:bold; cursor:pointer;">重新開始</button>
        </div>
        <div id="resultGrid" class="result-grid"></div>
        <div class="plaza-section">
            <h2 class="plaza-title">✨ 看看其他人的靈感 ✨</h2>
            <div id="plazaGridResult" class="plaza-grid"></div>
        </div>
    </div>

    <div class="footer-copyright">版權所有 © 布魯托王 | Copyright by Pluto Wang</div>

    <script>
        const COS_CONFIG = {
            SecretId: 'AKIDlTBi16wYw50g8PRp0xiFYdU7VgcK7h3B', 
            SecretKey: 'uZzA6nJbepmTvAAwTmqjaFgsqY1GG0Wo', 
            Bucket: 'plutowang-1421932610',
            Region: 'ap-guangzhou'
        };
        const cos = new COS({ SecretId: COS_CONFIG.SecretId, SecretKey: COS_CONFIG.SecretKey });

        // 成果表專用的隨機柔和背景
        const softBgs = [
            { start: '#FDFCFB', end: '#E2D1C3' }, { start: '#E1F5FE', end: '#B3E5FC' },
            { start: '#F1F8E9', end: '#DCEDC8' }, { start: '#F3E5F5', end: '#E1BEE7' },
            { start: '#FFF3E0', end: '#FFE0B2' }, { start: '#FCE4EC', end: '#F8BBD0' }
        ];
        const selectedImageBg = softBgs[Math.floor(Math.random() * softBgs.length)];

        const bopomofoData = [{symbol:'ㄅ',pinyin:'b',examples:'八、爸、棒'},{symbol:'ㄆ',pinyin:'p',examples:'跑、拍、旁'},{symbol:'ㄇ',pinyin:'m',examples:'馬、門、慢'},{symbol:'ㄈ',pinyin:'f',examples:'方、風、飛'},{symbol:'ㄉ',pinyin:'d',examples:'大、地、電'},{symbol:'ㄊ',pinyin:'t',examples:'天、甜、台'},{symbol:'ㄋ',pinyin:'n',examples:'你、那、牛'},{symbol:'ㄌ',pinyin:'l',examples:'老、亮、路'},{symbol:'ㄍ',pinyin:'g',examples:'哥、高、光'},{symbol:'ㄎ',pinyin:'k',examples:'開、看、快'},{symbol:'ㄏ',pinyin:'h',examples:'好、火、紅'},{symbol:'ㄐ',pinyin:'j',examples:'家、見、叫'},{symbol:'ㄑ',pinyin:'q',examples:'去、奇、請'},{symbol:'ㄒ',pinyin:'x',examples:'小、謝、心'},{symbol:'ㄓ',pinyin:'zh',examples:'中、真、正'},{symbol:'ㄔ',pinyin:'ch',examples:'吃、出、長'},{symbol:'ㄕ',pinyin:'sh',examples:'是、書、手'},{symbol:'ㄖ',pinyin:'r',examples:'日、熱、肉'},{symbol:'ㄗ',pinyin:'z',examples:'子、早、走'},{symbol:'ㄘ',pinyin:'c',examples:'草、從、此'},{symbol:'ㄙ',pinyin:'s',examples:'三、四、思'},{symbol:'ㄧ',pinyin:'i/y',examples:'一、衣、以'},{symbol:'ㄨ',pinyin:'u/w',examples:'五、問、我'},{symbol:'ㄩ',pinyin:'ü/yu',examples:'魚、雨、玉'},{symbol:'ㄚ',pinyin:'a',examples:'阿、爸、馬'},{symbol:'ㄛ',pinyin:'o',examples:'喔、波、火'},{symbol:'ㄜ',pinyin:'e',examples:'哥、得、熱'},{symbol:'ㄝ',pinyin:'ê',examples:'欸、且、寫'},{symbol:'ㄞ',pinyin:'ai',examples:'愛、台、開'},{symbol:'ㄟ',pinyin:'ei',examples:'飛、雷、北'},{symbol:'ㄠ',pinyin:'ao',examples:'奧、早、高'},{symbol:'ㄡ',pinyin:'ou',examples:'歐、受、揉'},{symbol:'ㄢ',pinyin:'an',examples:'安、天、看'},{symbol:'ㄣ',pinyin:'en',examples:'恩、門、真'},{symbol:'ㄤ',pinyin:'ang',examples:'昂、旁、光'},{symbol:'ㄥ',pinyin:'eng',examples:'風、中、正'},{symbol:'ㄦ',pinyin:'er',examples:'兒、二、而'}];
        const rainbowColors = ["#FF6B9D","#FF8C74","#FDCB6E","#A8E68F","#55EFC4","#74B9FF","#6C5CE7","#B175FF","#FF76C8","#FF5252","#FF9F43","#C7E700","#3EE8D1","#42A5F5","#7E57C2","#EC407A","#FFAB40","#00E676","#00B8D4","#6200EA","#B2FF59","#FFFF00","#FF6E40","#EA80FC","#00BFA5","#D81B60","#1E88E5","#8E24AA","#43A047","#FDD835","#5C6BC0","#26A69A","#FFA000","#F4511E","#9C27B0","#3949AB","#00ACC1"];

        let currentIndex = 0; let userDrawings = {}; let userAssociations = {}; let historyStack = []; 
        let isDrawing = false; let userName = "我"; let currentColor = '#FF5252'; // 初始為紅色

        const canvas = document.getElementById('drawingCanvas'); const ctx = canvas.getContext('2d');
        const associationInput = document.getElementById('associationInput');
        const colorBtn = document.getElementById('changeColorBtn');

        function hexToRgba(hex, alpha) { var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `rgba(${r}, ${g}, ${b}, ${alpha})`; }
        function speakCurrent() { const u = new SpeechSynthesisUtterance(bopomofoData[currentIndex].symbol); u.lang = 'zh-TW'; u.rate = 0.8; window.speechSynthesis.speak(u); }
        function initCanvas() {
            const rect = canvas.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height;
            historyStack = []; 
            if (userDrawings[bopomofoData[currentIndex].symbol]) {
                const img = new Image(); img.src = userDrawings[bopomofoData[currentIndex].symbol];
                img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); saveState(); };
            } else { saveState(); }
        }
        function saveState() { historyStack.push(canvas.toDataURL()); if (historyStack.length > 25) historyStack.shift(); }
        function undo() {
            if (historyStack.length > 1) {
                historyStack.pop(); const img = new Image(); img.src = historyStack[historyStack.length - 1];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); userDrawings[bopomofoData[currentIndex].symbol] = canvas.toDataURL(); };
            }
        }
        function getPoint(e) {
            const rect = canvas.getBoundingClientRect(); let clientX, clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } else { clientX = e.clientX; clientY = e.clientY; }
            const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }
        canvas.onmousedown = canvas.ontouchstart = (e) => { e.preventDefault(); isDrawing = true; const { x, y } = getPoint(e); ctx.beginPath(); ctx.moveTo(x, y); };
        canvas.onmousemove = canvas.ontouchmove = (e) => { if (!isDrawing) return; e.preventDefault(); const { x, y } = getPoint(e); ctx.lineTo(x, y); ctx.strokeStyle = currentColor; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke(); };
        canvas.onmouseup = canvas.ontouchend = canvas.onmouseleave = () => { if (!isDrawing) return; isDrawing = false; saveState(); userDrawings[bopomofoData[currentIndex].symbol] = canvas.toDataURL(); };
        
        function updatePage() {
            const d = bopomofoData[currentIndex];
            document.getElementById('currentSymbol').textContent = d.symbol;
            document.getElementById('currentSymbol').style.color = rainbowColors[currentIndex];
            document.getElementById('pinyin').textContent = d.pinyin;
            document.getElementById('exampleWord').textContent = d.examples;
            document.getElementById('symbolWatermark').textContent = d.symbol;
            document.getElementById('symbolWatermark').style.color = rainbowColors[currentIndex];
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('bReference').style.display = (d.symbol === 'ㄅ') ? 'block' : 'none';
            associationInput.value = userAssociations[d.symbol] || "";
            initCanvas();
        }

        function loadPlaza(targetId) {
            const grid = document.getElementById(targetId);
            cos.getBucket({ Bucket: COS_CONFIG.Bucket, Region: COS_CONFIG.Region, Prefix: 'bopomo/' }, (err, data) => {
                if (err) return; grid.innerHTML = '';
                const files = data.Contents.filter(f => f.Size > 0).sort((a,b) => new Date(b.LastModified) - new Date(a.LastModified));
                files.slice(0, 12).forEach(file => {
                    const url = `https://${COS_CONFIG.Bucket}.cos.${COS_CONFIG.Region}.myqcloud.com/${file.Key}`;
                    const div = document.createElement('div'); div.className = 'plaza-item';
                    div.innerHTML = `<img src="${url}" onclick="openLightbox('${url}')">`;
                    grid.appendChild(div);
                });
            });
        }
        function openLightbox(url) { document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').style.display = 'flex'; }

        function prepareFinalCanvas(callback) {
            const c = document.createElement('canvas'); const ctx2 = c.getContext('2d');
            const cellW = 220, cellH = 280, cols = 6;
            c.width = cols * cellW + 80; c.height = Math.ceil(37/cols) * cellH + 250;
            
            const grd = ctx2.createLinearGradient(0, 0, 0, c.height);
            grd.addColorStop(0, selectedImageBg.start); grd.addColorStop(1, selectedImageBg.end);
            ctx2.fillStyle = grd; ctx2.fillRect(0, 0, c.width, c.height);

            // 標題字色彩調整為紫色漸層感（與網頁一樣）
            const titleGrd = ctx2.createLinearGradient(0, 0, c.width, 0);
            titleGrd.addColorStop(0, "#FF6B9D");
            titleGrd.addColorStop(0.5, "#74B9FF");
            titleGrd.addColorStop(1, "#6C5CE7");
            ctx2.fillStyle = titleGrd; 
            ctx2.font = 'bold 50px Arial'; ctx2.textAlign = 'center';
            ctx2.fillText(`${userName}ㄉ注音符號聯想表`, c.width/2, 100);

            let loaded = 0; const drawings = bopomofoData.filter(d => userDrawings[d.symbol]);
            const finalize = () => {
                ctx2.fillStyle = '#999'; ctx2.font = 'bold 20px Arial'; ctx2.textAlign = 'center';
                ctx2.fillText('版權所有 © 布魯托王 | Copyright by Pluto Wang', c.width/2, c.height - 50);
                callback(c);
            };

            bopomofoData.forEach((d, i) => {
                const x = (i % cols) * cellW + 50, y = Math.floor(i / cols) * cellH + 180;
                ctx2.fillStyle = 'rgba(255, 255, 255, 0.5)';
                if (ctx2.roundRect) ctx2.beginPath(), ctx2.roundRect(x, y, cellW-20, cellH-20, 20), ctx2.fill(); else ctx2.fillRect(x, y, cellW-20, cellH-20);
                
                ctx2.textAlign = 'center'; ctx2.fillStyle = rainbowColors[i]; ctx2.font = 'bold 45px Arial'; ctx2.fillText(d.symbol, x + 100, y + 60);
                ctx2.fillStyle = '#666'; ctx2.font = '20px Arial'; ctx2.fillText(d.pinyin, x + 100, y + 95);
                ctx2.fillStyle = '#333'; ctx2.font = 'bold 22px "Microsoft JhengHei"'; ctx2.fillText(userAssociations[d.symbol] || '', x + 100, y + cellH - 45);
                
                if (userDrawings[d.symbol]) {
                    const img = new Image(); img.src = userDrawings[d.symbol];
                    img.onload = () => {
                        const maxWidth = 160, maxHeight = 130;
                        let dw = img.width, dh = img.height;
                        const ratio = Math.min(maxWidth / dw, maxHeight / dh);
                        dw *= ratio; dh *= ratio;
                        const dx = x + 100 - dw / 2;
                        const dy = y + 105 + (maxHeight - dh) / 2;
                        ctx2.drawImage(img, dx, dy, dw, dh);
                        loaded++; if(loaded === drawings.length) finalize();
                    };
                }
            });
            if (drawings.length === 0) finalize();
        }

        function autoUploadToPlaza() {
            prepareFinalCanvas(finalCanvas => {
                finalCanvas.toBlob(blob => {
                    const fileName = `bopomo/${userName}_${Date.now()}.jpg`;
                    cos.putObject({ Bucket: COS_CONFIG.Bucket, Region: COS_CONFIG.Region, Key: fileName, Body: blob }, (err) => {
                        if (!err) loadPlaza('plazaGridResult');
                    });
                }, 'image/jpeg', 0.8);
            });
        }

        associationInput.oninput = () => { userAssociations[bopomofoData[currentIndex].symbol] = associationInput.value; };
        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('clearBtn').onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); saveState(); delete userDrawings[bopomofoData[currentIndex].symbol]; };
        
        // 換色按鈕點擊邏輯
        colorBtn.onclick = () => {
            const palette = ["#FF5252","#FF6B9D","#FDCB6E","#A8E68F","#74B9FF","#6C5CE7"];
            currentColor = palette[Math.floor(Math.random() * palette.length)];
            colorBtn.style.backgroundColor = currentColor;
        };

        document.getElementById('startBtn').onclick = () => { 
            userName = document.getElementById('userNameInput').value.trim() || "我"; 
            document.getElementById('home-screen').style.display = 'none'; 
            document.getElementById('learning-screen').style.display = 'block'; 
            document.getElementById('learningTitle').textContent = `${userName}ㄉ注音練習本`; 
            // 點擊開始時，換色按鈕立即顯示初始顏色
            colorBtn.style.backgroundColor = currentColor;
            updatePage(); 
        };
        
        document.getElementById('nextBtn').onclick = () => { 
            userAssociations[bopomofoData[currentIndex].symbol] = associationInput.value;
            if (currentIndex < 36) { currentIndex++; updatePage(); } 
            else { autoUploadToPlaza(); showResult(); } 
        };
        document.getElementById('prevBtn').onclick = () => { if (currentIndex > 0) { currentIndex--; updatePage(); } };
        
        function showResult() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('finalTitle').textContent = `${userName}ㄉ注音符號聯想表`;
            const grid = document.getElementById('resultGrid'); grid.innerHTML = '';
            bopomofoData.forEach((d, i) => {
                const item = document.createElement('div');
                item.className = 'result-item'; item.style.backgroundColor = hexToRgba(rainbowColors[i], 0.15);
                item.innerHTML = `<div style="font-size:28px; font-weight:bold; color:${rainbowColors[i]}">${d.symbol}</div><div class="result-drawing">${userDrawings[d.symbol] ? `<img src="${userDrawings[d.symbol]}">` : ''}</div><div class="result-text">${userAssociations[d.symbol] || ''}</div>`;
                grid.appendChild(item);
            });
        }

        document.getElementById('downloadAllBtn').onclick = () => {
            prepareFinalCanvas(c => { const link = document.createElement('a'); link.download = `${userName}_注音符號表.png`; link.href = c.toDataURL(); link.click(); });
        };

        window.onload = () => loadPlaza('plazaGridHome');
        window.onresize = initCanvas;
        document.getElementById('restartBtn').onclick = () => location.reload();
    </script>
</body>
</html>
