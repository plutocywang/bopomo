<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注音練習本</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #FF9AAA, #FFC9DE, #B1E5FF, #D4A5FF, #FFE4A8, #A8FFD9);
            background-size: 600% 600%;
            animation: bgGradient 15s ease infinite;
            background-attachment: fixed;
            padding: 20px;
            padding-bottom: 70px;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 4px solid #FFD6E0;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #FF6B9D, #74B9FF, #6C5CE7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }
        
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;
        }
        
        .name-input-group {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;
        }

        #userNameInput {
            font-size: 32px; padding: 10px 20px; border-radius: 15px; border: 4px solid #FFD6E0; text-align: center; width: 250px; outline: none; color: #6C5CE7; font-weight: bold;
        }

        .canvas-container {
            position: relative; width: 100%; height: 380px; border: 4px solid #74B9FF; border-radius: 15px; background: white; overflow: hidden;
        }
        
        canvas { width: 100%; height: 100%; cursor: crosshair; display: block; }
        
        .symbol-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 180px; opacity: 0.1; pointer-events: none;
        }

        /* 參考提示區 */
        .reference-area {
            background: #FFF9FB; border-radius: 15px; padding: 20px; border: 2px dashed #FFD6E0; display: none; margin-top: 20px;
        }

        .reference-area h4 { color: #FF6B9D; margin-bottom: 15px; text-align: center; font-size: 18px; }

        .ref-img-container {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
        }

        /* 保持圖片比例 */
        .ref-img-container img {
            max-width: 280px; 
            max-height: 400px;
            width: auto; 
            height: auto;
            object-fit: contain; 
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid white;
            background-color: #eee;
        }

        .btn-primary {
            background: linear-gradient(135deg, #74B9FF, #6C5CE7); color: white; padding: 15px 45px; border: none; border-radius: 15px; font-size: 20px; cursor: pointer; font-weight: bold; transition: transform 0.2s;
        }

        .btn-primary:hover { transform: scale(1.05); }

        #changeColorBtn {
            padding: 8px 20px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.05); font-weight: bold; cursor: pointer;
        }

        .footer-copyright {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); text-align: center; padding: 12px; font-weight: bold; border-top: 2px solid #FFD6E0; z-index: 1000;
        }

        .result-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px;
        }
        
        .result-item { border-radius: 15px; padding: 12px; text-align: center; }
        .result-drawing { width: 100%; height: 90px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .result-drawing img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

    <div id="home-screen" class="container">
        <div class="name-input-group">
            <input type="text" id="userNameInput" placeholder="輸入名字">
            <h1 class="home-title">ㄉ注音練習本</h1>
        </div>
        <button id="startBtn" class="btn-primary" style="border-radius: 50px;">開始練習</button>
    </div>

    <div id="learning-screen" class="container" style="display:none;">
        <h1 id="learningTitle">注音練習本</h1>
        
        <div class="symbol-section" style="margin-bottom: 20px; text-align: center; background: #F8F9FF; padding: 20px; border-radius: 20px; border: 2px solid #E0E7FF;">
            <div id="currentSymbol" style="font-size: 100px; font-weight: bold; line-height: 1;">ㄅ</div>
            <div style="font-size: 18px; font-weight: bold; color: #666; margin-top: 10px;">拼音: <span id="pinyin">b</span> | 例字: <span id="exampleWord">八</span></div>
        </div>
        
        <div class="drawing-main-layout">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="color: #6C5CE7;">✏️ 畫下你的聯想圖</h3>
                <div style="display:flex; gap: 8px;">
                    <button id="clearBtn" style="padding: 8px 15px; border-radius: 12px; border:none; background:#FDCB6E; font-weight:bold; cursor:pointer;">清除</button>
                    <button id="changeColorBtn">畫筆顏色</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="drawingCanvas"></canvas>
                <div id="symbolWatermark" class="symbol-watermark">ㄅ</div>
            </div>

            <div id="bReference" class="reference-area">
                <h4>💡布魯托的聯想參考：</h4>
                <div class="ref-img-container">
                    <img src="1.jpg" alt="參考圖 1">
                    <img src="2.jpg" alt="參考圖 2">
                </div>
            </div>
        </div>
        
        <div class="navigation" style="display:flex; gap: 15px; margin-top: 20px;">
            <button id="prevBtn" class="btn-primary" style="padding:15px;" disabled>上一個</button>
            <button id="nextBtn" class="btn-primary" style="padding:15px;">下一個</button>
        </div>
    </div>

    <div id="result-screen" class="container">
        <h1 id="finalTitle" class="result-top-title">注音練習成果</h1>
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:25px;">
            <button id="downloadAllBtn" style="background:#55EFC4; border:none; padding:15px 30px; border-radius:15px; font-weight:bold; cursor:pointer; font-size:18px;">💾 下載精美成果表</button>
            <button id="restartBtn" style="background:#74B9FF; border:none; padding:15px 30px; border-radius:15px; color:white; font-weight:bold; cursor:pointer;">重新開始</button>
        </div>
        <div id="resultGrid" class="result-grid"></div>
    </div>

    <div class="footer-copyright">
        <span>版權所有 © 布魯托王 | Copyright by Pluto Wang</span>
    </div>

    <script>
        const bopomofoData = [
            { symbol: 'ㄅ', pinyin: 'b', example: { word: '八' } }, { symbol: 'ㄆ', pinyin: 'p', example: { word: '坡' } },
            { symbol: 'ㄇ', pinyin: 'm', example: { word: '摸' } }, { symbol: 'ㄈ', pinyin: 'f', example: { word: '佛' } },
            { symbol: 'ㄉ', pinyin: 'd', example: { word: '得' } }, { symbol: 'ㄊ', pinyin: 't', example: { word: '特' } },
            { symbol: 'ㄋ', pinyin: 'n', example: { word: '呢' } }, { symbol: 'ㄌ', pinyin: 'l', example: { word: '了' } },
            { symbol: 'ㄍ', pinyin: 'g', example: { word: '哥' } }, { symbol: 'ㄎ', pinyin: 'k', example: { word: '科' } },
            { symbol: 'ㄏ', pinyin: 'h', example: { word: '和' } }, { symbol: 'ㄐ', pinyin: 'j', example: { word: '基' } },
            { symbol: 'ㄑ', pinyin: 'q', example: { word: '期' } }, { symbol: 'ㄒ', pinyin: 'x', example: { word: '西' } },
            { symbol: 'ㄓ', pinyin: 'zh', example: { word: '之' } }, { symbol: 'ㄔ', pinyin: 'ch', example: { word: '吃' } },
            { symbol: 'ㄕ', pinyin: 'sh', example: { word: '是' } }, { symbol: 'ㄖ', pinyin: 'r', example: { word: '日' } },
            { symbol: 'ㄗ', pinyin: 'z', example: { word: '資' } }, { symbol: 'ㄘ', pinyin: 'c', example: { word: '詞' } },
            { symbol: 'ㄙ', pinyin: 's', example: { word: '思' } }, { symbol: 'ㄧ', pinyin: 'i/y', example: { word: '一' } },
            { symbol: 'ㄨ', pinyin: 'u/w', example: { word: '五' } }, { symbol: 'ㄩ', pinyin: 'ü/yu', example: { word: '魚' } },
            { symbol: 'ㄚ', pinyin: 'a', example: { word: '阿' } }, { symbol: 'ㄛ', pinyin: 'o', example: { word: '喔' } },
            { symbol: 'ㄜ', pinyin: 'e', example: { word: '鵝' } }, { symbol: 'ㄝ', pinyin: 'ê', example: { word: '欸' } },
            { symbol: 'ㄞ', pinyin: 'ai', example: { word: '愛' } }, { symbol: 'ㄟ', pinyin: 'ei', example: { word: '飛' } },
            { symbol: 'ㄠ', pinyin: 'ao', example: { word: '奧' } }, { symbol: 'ㄡ', pinyin: 'ou', example: { word: '歐' } },
            { symbol: 'ㄢ', pinyin: 'an', example: { word: '安' } }, { symbol: 'ㄣ', pinyin: 'en', example: { word: '恩' } },
            { symbol: 'ㄤ', pinyin: 'ang', example: { word: '昂' } }, { symbol: 'ㄥ', pinyin: 'eng', example: { word: '風' } },
            { symbol: 'ㄦ', pinyin: 'er', example: { word: '兒' } }
        ];

        const rainbowColors = ["#FF6B9D","#FF8C74","#FDCB6E","#A8E68F","#55EFC4","#74B9FF","#6C5CE7","#B175FF","#FF76C8","#FF5252","#FF9F43","#C7E700","#3EE8D1","#42A5F5","#7E57C2","#EC407A","#FFAB40","#00E676","#00B8D4","#6200EA","#B2FF59","#FFFF00","#FF6E40","#EA80FC","#00BFA5","#D81B60","#1E88E5","#8E24AA","#43A047","#FDD835","#5C6BC0","#26A69A","#FFA000","#F4511E","#9C27B0","#3949AB","#00ACC1"];

        let currentIndex = 0; let userDrawings = {}; let completedSymbols = new Set();
        let isDrawing = false; let userName = "我"; let currentColor = '#6C5CE7';

        const canvas = document.getElementById('drawingCanvas'); const ctx = canvas.getContext('2d');
        const colorBtn = document.getElementById('changeColorBtn');

        function hexToRgba(hex, alpha) {
            var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function initCanvas() {
            const rect = canvas.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height; redraw();
        }

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (userDrawings[bopomofoData[currentIndex].symbol]) {
                const img = new Image(); img.src = userDrawings[bopomofoData[currentIndex].symbol];
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }
        }

        function getPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX - rect.left : e.offsetX;
            const y = e.touches ? e.touches[0].clientY - rect.top : e.offsetY;
            return { x, y };
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => { e.preventDefault(); isDrawing = true; const { x, y } = getPoint(e); ctx.beginPath(); ctx.moveTo(x, y); };
        canvas.onmousemove = canvas.ontouchmove = (e) => { if (!isDrawing) return; const { x, y } = getPoint(e); ctx.lineTo(x, y); ctx.strokeStyle = currentColor; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke(); };
        canvas.onmouseup = canvas.ontouchend = () => { if (!isDrawing) return; isDrawing = false; userDrawings[bopomofoData[currentIndex].symbol] = canvas.toDataURL(); completedSymbols.add(bopomofoData[currentIndex].symbol); };

        function updateSymbol() {
            const d = bopomofoData[currentIndex];
            document.getElementById('currentSymbol').textContent = d.symbol;
            document.getElementById('currentSymbol').style.color = rainbowColors[currentIndex];
            document.getElementById('pinyin').textContent = d.pinyin;
            document.getElementById('exampleWord').textContent = d.example.word;
            document.getElementById('symbolWatermark').textContent = d.symbol;
            document.getElementById('symbolWatermark').style.color = rainbowColors[currentIndex];
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('bReference').style.display = (d.symbol === 'ㄅ') ? 'block' : 'none';
            initCanvas();
        }

        colorBtn.onclick = () => {
            const palette = ["#FF6B9D","#FF8C74","#FDCB6E","#A8E68F","#55EFC4","#74B9FF","#6C5CE7","#B175FF"];
            currentColor = palette[Math.floor(Math.random() * palette.length)];
            colorBtn.style.backgroundColor = currentColor; colorBtn.style.color = 'white';
        };

        document.getElementById('startBtn').onclick = () => {
            userName = document.getElementById('userNameInput').value.trim() || "我";
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('learning-screen').style.display = 'block';
            document.getElementById('learningTitle').textContent = `${userName}ㄉ注音練習本`;
            colorBtn.style.backgroundColor = currentColor; colorBtn.style.color = 'white';
            updateSymbol();
        };

        document.getElementById('nextBtn').onclick = () => { if (currentIndex < bopomofoData.length - 1) { currentIndex++; updateSymbol(); } else { showResult(); } };
        document.getElementById('prevBtn').onclick = () => { if (currentIndex > 0) { currentIndex--; updateSymbol(); } };
        document.getElementById('clearBtn').onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); delete userDrawings[bopomofoData[currentIndex].symbol]; };

        function showResult() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('finalTitle').textContent = `${userName}ㄉ注音符號表`;
            const grid = document.getElementById('resultGrid'); grid.innerHTML = '';
            bopomofoData.forEach((d, i) => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.style.backgroundColor = hexToRgba(rainbowColors[i], 0.12);
                item.innerHTML = `<div style="font-size:28px; font-weight:bold; color:${rainbowColors[i]}">${d.symbol}</div>
                    <div style="font-size:12px; color:#666; margin-bottom:5px;">${d.pinyin}</div>
                    <div class="result-drawing">${userDrawings[d.symbol] ? `<img src="${userDrawings[d.symbol]}">` : ''}</div>`;
                grid.appendChild(item);
            });
        }

        document.getElementById('downloadAllBtn').onclick = () => {
            const c = document.createElement('canvas'); const ctx2 = c.getContext('2d');
            const cell = 220; const cols = 6; const rows = Math.ceil(37/cols);
            c.width = cols * cell + 60; c.height = rows * cell + 220;
            const grd = ctx2.createLinearGradient(0, 0, c.width, c.height);
            grd.addColorStop(0, "#FFF5F7"); grd.addColorStop(1, "#F0F9FF");
            ctx2.fillStyle = grd; ctx2.fillRect(0, 0, c.width, c.height);
            ctx2.fillStyle = '#6C5CE7'; ctx2.font = 'bold 50px Microsoft JhengHei'; ctx2.textAlign = 'center';
            ctx2.fillText(`${userName}ㄉ注音符號表`, c.width/2, 80);

            let loaded = 0;
            bopomofoData.forEach((d, i) => {
                const x = (i % cols) * cell + 30; const y = Math.floor(i / cols) * cell + 130;
                ctx2.fillStyle = hexToRgba(rainbowColors[i], 0.15);
                ctx2.roundRect ? ctx2.fillRoundedRect(x, y, cell-15, cell-15, 20) : ctx2.fillRect(x, y, cell-15, cell-15);
                ctx2.fillStyle = rainbowColors[i]; ctx2.font = 'bold 45px Arial'; ctx2.textAlign = 'center';
                ctx2.fillText(d.symbol, x + (cell-15)/2, y + 60);
                ctx2.fillStyle = '#888'; ctx2.font = '20px Arial'; ctx2.fillText(d.pinyin, x + (cell-15)/2, y + 95);
                if (userDrawings[d.symbol]) {
                    const img = new Image(); img.src = userDrawings[d.symbol];
                    img.onload = () => {
                        ctx2.drawImage(img, x+20, y+105, cell-55, cell-125);
                        loaded++;
                        if (loaded === completedSymbols.size || loaded === 37) finishDownload(c);
                    };
                } else { loaded++; if (loaded === 37) finishDownload(c); }
            });
        };

        function finishDownload(c) {
            const ctx2 = c.getContext('2d');
            ctx2.fillStyle = '#999'; ctx2.font = 'bold 18px Arial'; ctx2.textAlign = 'center';
            ctx2.fillText('版權所有 © 布魯托王 | Copyright by Pluto Wang', c.width/2, c.height - 40);
            const link = document.createElement('a'); link.download = `${userName}_成果.png`; link.href = c.toDataURL(); link.click();
        }

        CanvasRenderingContext2D.prototype.fillRoundedRect = function(x, y, w, h, r) {
            this.beginPath(); this.moveTo(x+r, y); this.arcTo(x+w, y, x+w, y+h, r); this.arcTo(x+w, y+h, x, y+h, r); this.arcTo(x, y+h, x, y, r); this.arcTo(x, y, x+w, y, r); this.closePath(); this.fill();
        };

        document.getElementById('restartBtn').onclick = () => location.reload();
        window.onresize = initCanvas;
    </script>
</body>
</html>
